name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            git fetch origin main
            git reset --hard origin/main

            composer install --no-interaction --prefer-dist --optimize-autoloader
            npm install
            npm run build

            if [ -f "mobile/bonnetje_app/build/app/outputs/flutter-apk/app-release.apk" ] && [ -f "mobile/bonnetje_app/build/app/outputs/bundle/release/app-release.aab" ]; then
              npm run publish:android-release
            fi

            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache